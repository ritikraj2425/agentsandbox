# AgentSandbox Policy: No Network

name: no-network
description: Allows local shell and workspace file actions, denies browser/network actions.
default_effect: deny
max_action_duration_ms: 120000

action_types:
  allow:
    - shell.run
    - file.read
    - file.write
    - file.patch
    - task.done
  deny:
    - browser.goto
    - browser.evaluate

shell:
  allow_prefixes:
    - go
    - gofmt
    - git
    - ls
    - cat
    - pwd
    - echo
  deny_prefixes:
    - curl
    - wget
    - ssh
    - sudo
    - rm -rf

file:
  allow_paths:
    - .
  deny_paths:
    - .git
    - .env

browser:
  deny_domains:
    - "*"
