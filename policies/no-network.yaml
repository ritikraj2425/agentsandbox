# AgentSandbox Policy: No Network
#
# This policy allows filesystem and shell operations
# while denying all network access. Suitable for offline coding tasks.

name: no-network
version: "1"
description: >
  A policy that allows shell and filesystem operations but blocks
  all network requests. Suitable for offline coding tasks.

default_effect: deny

rules:
  - action: shell
    effect: allow
    description: "Allow shell command execution"

  - action: file_read
    effect: allow
    description: "Allow reading any file"

  - action: file_write
    effect: allow
    description: "Allow writing files"

  - action: network
    effect: deny
    description: "Block all network requests"
