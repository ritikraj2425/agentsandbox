# AgentSandbox Policy: Browser Safe

name: browser-safe
description: Allows browser navigation to common safe domains and read-only files.
default_effect: deny
max_action_duration_ms: 60000

action_types:
  allow:
    - browser.goto
    - browser.click
    - browser.type
    - browser.press
    - browser.wait_for
    - browser.screenshot
    - browser.evaluate
    - browser.assert
    - browser.user_handoff
    - file.read
    - task.done
  deny:
    - shell.run
    - file.write
    - file.patch

file:
  allow_paths:
    - .
  deny_paths:
    - .git
    - .env

browser:
  allow_domains:
    - example.com
    - wikipedia.org
    - github.com
  deny_domains:
    - localhost
    - 127.0.0.1
    - 0.0.0.0

approval_required:
  browser_domains:
    - accounts.google.com
