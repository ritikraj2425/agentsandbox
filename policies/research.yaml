# AgentSandbox Policy: Research
#
# Broad policy for trusted research sandboxes. Deny still wins over allow.

name: research
description: Broad action policy for trusted, controlled research sessions.
default_effect: deny
max_action_duration_ms: 300000

action_types:
  allow:
    - "*"

shell:
  deny_prefixes:
    - sudo
    - rm -rf /

file:
  allow_paths:
    - .
  deny_paths:
    - .git
    - .env

browser:
  deny_domains:
    - 169.254.169.254
