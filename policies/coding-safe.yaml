# AgentSandbox Policy: Coding Safe
#
# Allows common local coding actions while keeping network-oriented browser
# navigation off by default.

name: coding-safe
description: Local coding policy with shell and workspace file access.
default_effect: deny
max_action_duration_ms: 120000

action_types:
  allow:
    - shell.run
    - file.read
    - file.write
    - file.patch
    - task.done
  deny:
    - browser.goto

shell:
  allow_prefixes:
    - go
    - gofmt
    - git
    - ls
    - cat
    - pwd
    - echo
    - mkdir
    - touch
  deny_prefixes:
    - rm -rf
    - sudo
    - chmod 777

file:
  allow_paths:
    - .
  deny_paths:
    - .git
    - .env
    - agentsandbox.db

browser:
  deny_domains:
    - "*"

approval_required:
  shell_prefixes:
    - npm install
    - go get
